<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S++ — WIP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base: #0a0c0f;
      --border:  #1b2535;
      --accent:  #00c8ff;
      --wip:     #ff9900;
      --text-1:  #e2ecff;
      --text-2:  #6a8099;
      --text-3:  #2e3f52;
    }
    body {
      background: var(--bg-base);
      color: var(--text-1);
      font-family: 'SF Mono','Fira Code','Consolas',monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background-image: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,200,255,.05) 0%, transparent 60%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.025) 2px, rgba(0,0,0,.025) 4px);
    }
    .badge {
      font-size: .6rem;
      letter-spacing: .2em;
      padding: 4px 10px;
      border-radius: 2px;
      background: rgba(255,153,0,.1);
      border: 1px solid rgba(255,153,0,.35);
      color: var(--wip);
    }
    .icon {
      width: 56px; height: 56px;
      border-radius: 10px;
      background: rgba(255,153,0,.07);
      border: 1px solid rgba(255,153,0,.2);
      display: flex; align-items: center; justify-content: center;
      color: var(--wip);
    }
    .icon svg { width: 28px; height: 28px; }
    h1 { font-size: 1.5rem; font-weight: 700; color: var(--text-1); letter-spacing: -.02em; }
    h1 span { color: var(--accent); text-shadow: 0 0 18px rgba(0,200,255,.5); }
    p { font-size: .78rem; color: var(--text-2); letter-spacing: .04em; }
    a {
      font-size: .72rem;
      color: var(--text-3);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      transition: color .15s, border-color .15s;
    }
    a:hover { color: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>

  <span class="badge">WORK IN PROGRESS</span>
  <div class="icon" id="mod-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M12 6v6l4 2M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
  </div>
  <h1>S<span>++</span> — <span id="mod-name">開発中</span></h1>
  <p id="mod-desc">このモジュールは現在開発中です。</p>
  <a href="index.html">← ダッシュボードに戻る</a>

  <script>
    const MODULES = {
      'setup-eval': {
        name: 'セットアップ評価ツール',
        desc: 'A++/A/B/C 判定による客観的セットアップ評価システム。開発中。',
        icon: `<path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>`,
      },
      'journal': {
        name: 'トレードジャーナル',
        desc: '取引記録・振り返り・パターン分析ツール。開発中。',
        icon: `<path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>`,
      },
      'quiz': {
        name: 'クイズ',
        desc: 'ナレッジシステムの習熟度確認テスト。開発中。',
        icon: `<path d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>`,
      },
      'score': {
        name: 'スコアシステム',
        desc: '成績・成長トラッキング・評価指標ダッシュボード。開発中。',
        icon: `<path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>`,
      },
      'casestudy': {
        name: 'ケーススタディ',
        desc: '過去チャートを使った分析演習モジュール。開発中。',
        icon: `<path d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"/>`,
      },
      'order': {
        name: '発注システム',
        desc: 'ブローカー API 連携による注文管理システム。開発中。',
        icon: `<path d="M13 10V3L4 14h7v7l9-11h-7z"/>`,
      },
      'standby': {
        name: 'スタンバイ一覧',
        desc: 'エントリー候補・ウォッチリスト管理。開発中。',
        icon: `<path d="M4 6h16M4 10h16M4 14h16M4 18h16"/>`,
      },
    };

    const params = new URLSearchParams(location.search);
    const key    = params.get('module');
    const mod    = MODULES[key];

    if (mod) {
      document.getElementById('mod-name').textContent  = mod.name;
      document.getElementById('mod-desc').textContent  = mod.desc;
      document.getElementById('mod-icon').innerHTML =
        `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">${mod.icon}</svg>`;
      document.title = `S++ — ${mod.name}`;
    }
  </script>

</body>
</html>
